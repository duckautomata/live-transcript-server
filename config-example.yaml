# An example config file.
# Please do not edit this and instead make a copy and use that.
# By default, it will grab config.yaml
####################################################################

# Use command to generate creds
# openssl rand -base64 32
credentials:
  # credentials used to restrict the activate/deactive/update/upload endpoints
  apiKey: ""

# Database configuration used to tune performance
# See https://www.sqlite.org/pragma.html for more information
database:
  journal_mode: "WAL"
  busy_timeout_ms: 5000
  synchronous: "NORMAL"
  cache_size_kb: 200000 # 200MB
  temp_store: "MEMORY"
  mmap_size_bytes: 500000000 # 500MB

storage:
  type: "local" # "local" or "r2"
  r2:
    accountId: ""
    accessKeyId: ""
    secretAccessKey: ""
    bucket: ""
    publicUrl: ""

channels:
  # List of keys the server will work with.
  # numPastStreams is the number of past streams to keep.
  # If numPastStreams is 0, it will keep only the current stream.
  # Note: if using R2, numPastStreams is ignored and the bucket's lifecycle policy is used instead.
  # adminKey gates the per-channel admin UI (/{name}/ui) and admin endpoints
  # (/{name}/admin/*). Leave empty to disable admin operations for the channel.
  - name: key1
    numPastStreams: 5
    adminKey: ""
  - name: key2
    numPastStreams: 0
    adminKey: ""

# Discord configuration used to send system notifications.
# Optional. If left empty, no notifications will be sent.
discord:
  webhookUrl: ""
  # both user and role id are optional. If none are set, no ping will be sent.
  # Only one will be used. If both are set, the role id will be used.
  notifyUserId: ""
  notifyRoleId: ""

  # Optional Discord bot that listens for Pingcord stream-start messages and
  # queues the URL for the worker to pick up via GET /{channel}/incoming.
  # Leave token empty to disable.
  bot:
    token: ""
    # Discord channel IDs the bot should listen on. Messages in any other
    # channel are ignored.
    channelIds: []
    # Maps the channel name as it appears in the Pingcord message
    # ("{channel} {link}") to a server key from the channels list above.
    # Example:
    #   channelMap:
    #     "Dokibird": "doki"
    #     "Mint Fantôme": "mint"
    channelMap: {}
    # How long an unconsumed URL stays in the queue before the cleanup loop
    # removes it. 0 falls back to 1440 (24h).
    streamTtlMinutes: 1440
